<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <link rel="alternate" type="application/rss+xml" title="RSS Feed" href="{{ site.url }}/feed.xml">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      color: #333;
    }
    a {
      color: #0066cc;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    img {
      max-width: 100%;
      height: auto;
    }
    pre {
      background: #f4f4f4;
      padding: 15px;
      overflow-x: auto;
      border-radius: 5px;
    }
    code {
      background: #f4f4f4;
      padding: 2px 6px;
      border-radius: 3px;
    }
    pre code {
      background: none;
      padding: 0;
    }
    article {
      margin-bottom: 40px;
    }
    .post-meta {
      color: #666;
      font-size: 0.9em;
    }
    h1, h2, h3 {
      margin-top: 1.5em;
    }
    header {
      border-bottom: 1px solid #ddd;
      margin-bottom: 30px;
      padding-bottom: 10px;
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="/">{{ site.title }}</a></h1>
  </header>
  <main>
    {{ content }}
  </main>
</body>
</html>
